{% extends "base.html" %}
{% block title %}注册{% end %}
{% block body %}
<div class="login-page">
    <div class="login-container" style="max-width: 460px;">
        <div class="login-logo">
            <i class="fas fa-user-plus"></i>
            <h1>创建账号</h1>
            <p>注册成为 cnAgentOS 用户</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% end %}

        {% if success %}
        <div class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span>{{ success }}</span>
        </div>
        {% end %}

        <form class="login-form" method="post" action="/auth/register">
            {% module xsrf_form_html() %}

            <div class="form-group">
                <label>用户名</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="请输入用户名（3-20个字符）" required minlength="3" maxlength="20" autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="new-password">
                </div>
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirm_password" placeholder="请再次输入密码" required minlength="6" autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-user-plus"></i> 注册账号
            </button>
        </form>

        <div class="login-footer">
            已有账号？<a href="/auth/login">立即登录</a>
        </div>
    </div>
</div>
{% end %}
