{% extends "base.html" %}
{% block title %}登录{% end %}
{% block body %}
<div class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <i class="fas fa-robot"></i>
            <h1>cnAgentOS</h1>
            <p>AI智能瞭望与智能文数系统</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% end %}

        <form class="login-form" method="post" action="/auth/login">
            {% module xsrf_form_html() %}

            <div class="form-group">
                <label>用户名</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> 登录系统
            </button>
        </form>

        <div class="login-footer">
            <a href="/auth/register">还没有账号？立即注册</a>
        </div>
    </div>
</div>
{% end %}
